name: Build Aseprite
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enable Long Paths
        run: git config --system core.longpaths true

      - name: Install Build Tools
        run: choco install cmake ninja innosetup

      - name: Fetch Latest Aseprite Metadata
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN" }
          $resp = (Invoke-WebRequest -UseBasicParsing -Headers $headers -Uri https://api.github.com/repos/aseprite/aseprite/releases/latest).Content | ConvertFrom-Json
          $asset = $resp.assets | Where-Object { $_.name -like "*Source.zip" } | Select-Object -First 1
          if ($null -eq $asset) { throw "Could not find Aseprite Source.zip" }
          echo "DOWNLOAD_URL=$($asset.browser_download_url)" >> $env:GITHUB_ENV
          echo "ASE_VER=$($resp.tag_name)" >> $env:GITHUB_ENV

      - name: Download & Extract Source
        shell: powershell
        run: |
          # 1. Download and Extract
          Invoke-WebRequest -Uri ${{ env.DOWNLOAD_URL }} -OutFile "aseprite_src.zip"
          7z x "aseprite_src.zip" -o"temp_ext" -y
          
          # 2. Find the root folder containing CMakeLists.txt
          $rootFile = Get-ChildItem -Path "temp_ext" -Filter "CMakeLists.txt" -Recurse | Select-Object -First 1
          if ($null -eq $rootFile) { throw "CMakeLists.txt not found!" }
          $srcDir = $rootFile.Directory.FullName
          
          # 3. Move items using a safer PowerShell-native approach
          mkdir aseprite -Force
          Get-ChildItem -Path "$srcDir\*" | Move-Item -Destination "aseprite" -Force
          
          # 4. Final verification
          if (!(Test-Path "aseprite\CMakeLists.txt")) { exit 1 }
          Write-Host "[+] Source staged successfully."

      - name: Fetch & Extract Skia Binaries
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN" }
          $skia_resp = (Invoke-WebRequest -UseBasicParsing -Headers $headers -Uri https://api.github.com/repos/aseprite/skia/releases/latest).Content | ConvertFrom-Json
          $skia_asset = $skia_resp.assets | Where-Object { $_.name -eq "Skia-Windows-Release-x64.zip" } | Select-Object -First 1
          Invoke-WebRequest -Uri "$($skia_asset.browser_download_url)" -OutFile "skia.zip"
          mkdir skia -Force
          7z x "skia.zip" -o"skia" -y
          Write-Host "[+] Skia staged."

      - name: Initialize MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Run CMake Configuration
        shell: powershell
        run: |
          $src = "$env:GITHUB_WORKSPACE\aseprite"
          $build = "$env:GITHUB_WORKSPACE\build"
          $skia = "$env:GITHUB_WORKSPACE\skia"
          mkdir $build -Force
          cd $build
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="$skia" `
            -DSKIA_LIBRARY_DIR="$skia\out\Release-x64" `
            -DSKIA_LIBRARY="$skia\out\Release-x64\skia.lib" `
            -DENABLE_UPDATER=OFF `
            -DVERSION_OVERRIDE="${{ env.ASE_VER }}" `
            "$src"

      - name: Compile with Ninja
        run: |
          cd build
          ninja

      - name: Package Installer (Inno Setup)
        shell: powershell
        run: |
          $iss = @"
          [Setup]
          AppName=Aseprite
          AppVersion=${{ env.ASE_VER }}
          DefaultDirName={autopf}\Aseprite
          DefaultGroupName=Aseprite
          OutputBaseFilename=aseprite-setup-${{ env.ASE_VER }}
          OutputDir=../installer
          Compression=lzma
          SolidCompression=yes
          [Files]
          Source: "build\bin\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          [Icons]
          Name: "{group}\Aseprite"; Filename: "{app}\aseprite.exe"
          "@
          mkdir installer -Force
          $iss | Out-File -FilePath "aseprite.iss" -Encoding utf8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" aseprite.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ env.ASE_VER }}
          name: Aseprite ${{ env.ASE_VER }}
          files: installer/*.exe
          body: |
            Automated build of Aseprite ${{ env.ASE_VER }}.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
