name: Build Aseprite
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enable Long Paths
        run: git config --system core.longpaths true

      - name: Install Build Tools
        run: choco install cmake ninja innosetup

      - name: Fetch Latest Release Metadata
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN" }
          $resp = (Invoke-WebRequest -UseBasicParsing -Headers $headers -Uri https://api.github.com/repos/aseprite/aseprite/releases/latest).Content | ConvertFrom-Json
          $asset = $resp.assets | Where-Object { $_.name -like "*Source.zip" } | Select-Object -First 1
          echo "DOWNLOAD_URL=$($asset.browser_download_url)" >> $env:GITHUB_ENV
          echo "ASE_VER=$($resp.tag_name)" >> $env:GITHUB_ENV

      - name: Download & Extract Source
        shell: powershell
        run: |
          Invoke-WebRequest -Uri ${{ env.DOWNLOAD_URL }} -OutFile "aseprite_src.zip"
          7z x "aseprite_src.zip" -o"temp_ext" -y
          $rootFile = Get-ChildItem -Path "temp_ext" -Filter "CMakeLists.txt" -Recurse | Select-Object -First 1
          mkdir aseprite -Force
          Get-ChildItem -Path "$($rootFile.Directory.FullName)\*" | Move-Item -Destination "aseprite" -Force

      - name: Download & Extract Skia
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/aseprite/skia/releases/latest/download/Skia-Windows-Release-x64.zip" -OutFile "skia.zip"
          mkdir skia -Force
          7z x "skia.zip" -o"skia" -y

      - name: Initialize MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Run CMake Configuration
        shell: powershell
        run: |
          # FORCING ABSOLUTE PATHS TO FIX INTERFACE_INCLUDE_DIRECTORIES ERROR
          $abs_src = Join-Path $env:GITHUB_WORKSPACE "aseprite"
          $abs_skia = Join-Path $env:GITHUB_WORKSPACE "skia"
          $abs_build = Join-Path $env:GITHUB_WORKSPACE "build"
          
          mkdir $abs_build -Force
          Set-Location $abs_build
          
          # We pass ONLY full absolute paths here. No ".." allowed.
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="$abs_skia" `
            -DSKIA_LIBRARY_DIR="$abs_skia\out\Release-x64" `
            -DSKIA_LIBRARY="$abs_skia\out\Release-x64\skia.lib" `
            -DENABLE_UPDATER=OFF `
            "$abs_src"

      - name: Compile with Ninja
        run: |
          cd build
          ninja

      - name: Package Installer (Inno Setup)
        shell: powershell
        run: |
          $binPath = Join-Path $env:GITHUB_WORKSPACE "build\bin"
          $iss = @"
          [Setup]
          AppName=Aseprite
          AppVersion=${{ env.ASE_VER }}
          DefaultDirName={autopf}\Aseprite
          DefaultGroupName=Aseprite
          OutputBaseFilename=aseprite-setup
          OutputDir=installer
          Compression=lzma
          SolidCompression=yes
          [Files]
          Source: "$binPath\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          [Icons]
          Name: "{group}\Aseprite"; Filename: "{app}\aseprite.exe"
          "@
          mkdir installer -Force
          $iss | Out-File -FilePath "aseprite.iss" -Encoding utf8
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" aseprite.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ${{ env.ASE_VER }}
          name: Aseprite ${{ env.ASE_VER }}
          files: installer/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-Installer
          path: installer/*.exe
