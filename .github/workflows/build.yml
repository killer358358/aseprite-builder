name: Build Aseprite
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Enable Long Paths
        run: git config --system core.longpaths true

      - name: Install Dependencies
        run: choco install cmake ninja innosetup

      - name: Fetch Latest Aseprite Release Metadata
        shell: powershell
        run: |
          $resp = (Invoke-WebRequest -UseBasicParsing https://api.github.com/repos/aseprite/aseprite/releases/latest).Content | ConvertFrom-Json
          # Find the specifically uploaded 'Source.zip' (not the auto-generated one)
          $asset = $resp.assets | Where-Object { $_.name -like "*Source.zip" } | Select-Object -First 1
          if ($null -eq $asset) { throw "Could not find Source.zip asset" }
          
          echo "DOWNLOAD_URL=$($asset.browser_download_url)" >> $env:GITHUB_ENV
          echo "ASE_VER=$($resp.tag_name)" >> $env:GITHUB_ENV
          echo "[+] Detected Version: $($resp.tag_name)"

      - name: Download and Extract Source
        shell: powershell
        run: |
          Invoke-WebRequest -Uri ${{ env.DOWNLOAD_URL }} -OutFile "aseprite_src.zip"
          # Use 7z for better reliability on Windows runners
          7z x "aseprite_src.zip" -o"aseprite_temp"
          
          # Move files from nested folder to /aseprite
          $sub = (Get-ChildItem -Path "aseprite_temp" -Directory | Select-Object -First 1).FullName
          mkdir aseprite
          Move-Item -Path "$sub\*" -Destination "aseprite" -Force
          echo "[+] Source files prepared."

      - name: Download Skia
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/aseprite/skia/releases/latest/download/Skia-Windows-Release-x64.zip" -OutFile "skia.zip"
          7z x "skia.zip" -o"skia"

      - name: (MSVC) Initialize x64 Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Run CMake
        run: |
          mkdir build
          cd build
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR=../skia `
            -DSKIA_LIBRARY_DIR=../skia/out/Release-x64 `
            -DSKIA_LIBRARY=../skia/out/Release-x64/skia.lib `
            -DENABLE_UPDATER=OFF `
            -DVERSION_OVERRIDE=${{ env.ASE_VER }} `
            ../aseprite

      - name: Compile with Ninja
        run: |
          cd build
          ninja

      - name: Create Installer (Inno Setup)
        shell: powershell
        run: |
          $iss = @"
          [Setup]
          AppName=Aseprite
          AppVersion=${{ env.ASE_VER }}
          DefaultDirName={autopf}\Aseprite
          DefaultGroupName=Aseprite
          OutputBaseFilename=aseprite-setup-${{ env.ASE_VER }}
          OutputDir=../installer
          Compression=lzma
          SolidCompression=yes
          [Files]
          Source: "build\bin\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
          [Icons]
          Name: "{group}\Aseprite"; Filename: "{app}\aseprite.exe"
          "@
          mkdir installer
          $iss | Out-File -FilePath "aseprite.iss" -Encoding utf8
          # Use ISCC to compile the setup
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" aseprite.iss

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aseprite-Installer-${{ env.ASE_VER }}
          path: installer/*.exe
